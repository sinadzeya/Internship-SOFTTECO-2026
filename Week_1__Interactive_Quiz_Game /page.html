<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Art History Quiz Web Application</title>
</head>

<body>
    <div id="startScreen">
        <button id="startButton">Start The Quiz</button>
    </div>

    <div id="quizScreen" style="display: none;">
        <h4 id="number"></h4>
        <h1 id="question"></h1>
        <div id="choices"></div>
        <button id="submitButton">Submit</button>
    </div>

    <div id="finalScreen" style="display: none;">
        <h1 id="points"></h1>
        <button id="restartButton">Start Again</button>
    </div>

    <script src="index.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Art History Quiz Web Application</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="start-screen">
        <button class="action-button start-button">
            <span class="button-text">
                <span class="text-line-1">Start</span>
                <span class="text-line-2">The Quiz!</span>
            </span>
        </button>
    </div>

    <div class="quiz-screen" style="display: none;">
        <div class="stepper-container">
            <div class="progress-line"></div>
        </div>
        <div class="question-container">
            <div class="question"></div>
        </div>
        <div class="choices"></div>
        <button class="submit-button" type="button" disabled>Submit</button>
        <button class="next-button" style="display: none;">Next</button>
    </div>

    <div class="final-screen" style="display: none;">
        <h1 class="points"></h1>
        <button class="action-button restart-button">
            <span class="button-text">
                <span class="text-line-1">Start</span>
                <span class="text-line-2">Again</span>
            </span>
        </button>
    </div>

    <script src="index.js" />
</body>

</html>
